# em_prediction_service - Docker Compose
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: em_user
      POSTGRES_PASSWORD: em_pass_2026
      POSTGRES_DB: em_prediction
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U em_user -d em_prediction"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://em_user:em_pass_2026@db:5432/em_prediction
      DATABASE_URL_SYNC: postgresql+psycopg2://em_user:em_pass_2026@db:5432/em_prediction
      MODEL_DIR: /app/models
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://em_user:em_pass_2026@db:5432/em_prediction
      DATABASE_URL_SYNC: postgresql+psycopg2://em_user:em_pass_2026@db:5432/em_prediction
      MODEL_DIR: /app/models
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

volumes:
  pgdata:
