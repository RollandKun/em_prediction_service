# em_prediction_service - Docker Compose
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:W1ses0ft!@172.16.11.3:5432/electricity
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:W1ses0ft!@172.16.11.3:5432/electricity
      MODEL_DIR: /app/models
    deploy:
      resources:
        limits:
          memory: 2G

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:W1ses0ft!@172.16.11.3:5432/electricity
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:W1ses0ft!@172.16.11.3:5432/electricity
      MODEL_DIR: /app/models
    deploy:
      resources:
        limits:
          memory: 4G
